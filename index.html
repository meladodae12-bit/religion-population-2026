<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | إحصائيات الأديان</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

html { scroll-behavior:smooth; }

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#1e293b;
height:100vh;
position:fixed;
right:0;
top:0;
padding:20px;
transition:0.3s;
}

.sidebar h2{margin-bottom:20px;}

.sidebar a{
display:block;
padding:12px;
color:white;
text-decoration:none;
border-radius:10px;
margin-bottom:5px;
}

.sidebar a:hover{
background:#334155;
}

/* MENU BUTTON */
.menu-btn{
position:fixed;
top:15px;
right:15px;
background:#1e293b;
color:white;
border:none;
padding:10px;
font-size:20px;
z-index:1000;
}

/* CONTENT */
.content{
margin-right:260px;
padding:30px;
width:100%;
}

/* CARD */
.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* STATS */
.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.stat-box{
background:#334155;
padding:20px;
border-radius:12px;
text-align:center;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #444;
}

/* LOGIN */
.login{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.login-box{
background:#1e293b;
padding:30px;
border-radius:12px;
text-align:center;
}

input{
padding:10px;
width:200px;
margin:10px;
}

button{
padding:10px 20px;
cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
.sidebar{right:-260px;}
.sidebar.active{right:0;}
.content{margin-right:0;}
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
<div class="login-box">
<h2>🔐 تسجيل الدخول</h2>
<input type="text" placeholder="username" id="user"><br>
<input type="password" placeholder="password" id="pass"><br>
<button onclick="login()">دخول</button>
</div>
</div>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="sidebar" id="menu">
<h2>📊 Dashboard</h2>
<a href="#home">الرئيسية</a>
<a href="#stats">الإحصائيات</a>
<a href="#charts">الرسوم</a>
<a href="#tables">الجداول</a>
</div>

<div class="content">

<h1 id="home">📊 لوحة تحكم احترافية</h1>

<!-- STATS -->
<div class="stats" id="stats">

<div class="stat-box">
<h3>🕌 المسلمين</h3>
<h1 id="muslimCount">0</h1>
</div>

<div class="stat-box">
<h3>✝️ المسيحيين</h3>
<h1 id="christianCount">0</h1>
</div>

</div>

<!-- CHART -->
<div class="card" id="charts">
<h2><i class="fa fa-chart-line"></i> التحليل</h2>
<canvas id="chart"></canvas>
</div>

<!-- TABLE -->
<div class="card" id="tables">
<h2>📋 توزيع القارات</h2>

<table>
<tr><th>القارة</th><th>مسلمين</th><th>مسيحيين</th></tr>
<tr><td>آسيا</td><td>1.25B</td><td>420M</td></tr>
<tr><td>أفريقيا</td><td>450M</td><td>750M</td></tr>
<tr><td>أوروبا</td><td>60M</td><td>550M</td></tr>
</table>

</div>

</div>

<script>

/* LOGIN */
function login(){
let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

if(u==="admin" && p==="1234"){
document.getElementById("login").style.display="none";
}else{
alert("خطأ");
}
}

/* MENU */
function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

/* COUNTER ANIMATION */
function animate(id, target){
let el = document.getElementById(id);
let count = 0;
let step = target/100;

let interval = setInterval(()=>{
count += step;
if(count >= target){
count = target;
clearInterval(interval);
}
el.innerText = count.toFixed(1) + "B";
},20);
}

animate("muslimCount",2.1);
animate("christianCount",2.7);

/* CHART */
const ctx = document.getElementById('chart');

new Chart(ctx, {
type:'line',
data:{
labels:['2020','2022','2024','2026'],
datasets:[
{
label:'المسلمين',
data:[1.8,1.9,2.0,2.1],
borderColor:'#38bdf8'
},
{
label:'المسيحيين',
data:[2.5,2.6,2.65,2.7],
borderColor:'#4ade80'
}
]
}
});

</script>

</body>
</html>
